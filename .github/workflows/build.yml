name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      release_url:
        description: 'URL Release dengan ZIP file'
        required: true
        type: string
      tag:
        description: 'Tag build'
        required: true
        type: string
      build_type:
        description: 'Jenis build (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # 1. Setup environment
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
      
      # 2. Download ZIP dari Release
      - name: Download source code ZIP
        run: |
          echo "📥 Downloading ZIP from: ${{ github.event.inputs.release_url }}"
          curl -L -o project.zip "${{ github.event.inputs.release_url }}"
          echo "✅ ZIP downloaded successfully"
      
      - name: Extract ZIP
        run: |
          unzip -q project.zip -d project
          echo "✅ ZIP extracted successfully"
          ls -la project/
      
      # 3. Build APK
      - name: Get Flutter dependencies
        run: |
          cd project
          flutter pub get
          echo "✅ Dependencies installed"
      
      - name: Build APK
        run: |
          cd project
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
            echo "✅ Debug APK built successfully"
          else
            flutter build apk --release
            echo "✅ Release APK built successfully"
          fi
      
      # 4. Upload artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: project/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
      
      # 5. Cleanup
      - name: Cleanup
        run: |
          rm -rf project project.zip
          echo "🧹 Cleanup completed"
